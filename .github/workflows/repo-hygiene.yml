name: Repo Hygiene

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation tools
        run: pip install check-jsonschema

      - name: Validate benchmark example
        run: check-jsonschema --schemafile schemas/benchmark-item.schema.json benchmarks/examples/example-benchmark-item.yaml

      - name: Validate run manifest example
        run: check-jsonschema --schemafile schemas/run-manifest.schema.json runs/examples/example-run-manifest.yaml

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            **/*.md
