name: Pull Request CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    concurrency:
      group: pull-request-ci-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for hidden Unicode control characters
        run: node infra/scripts/check-bidi-chars.mjs

      - name: Test hidden Unicode guard fixtures
        run: node --test infra/scripts/check-bidi-chars.test.mjs

      - name: Test Problem 9 image verification guard fixtures
        run: node --test infra/scripts/check-problem9-image-toolchains.test.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify Problem 9 execution image toolchains
        run: node infra/scripts/check-problem9-image-toolchains.mjs --target problem9-execution --build

      - name: Verify Problem 9 devbox image toolchains
        run: node infra/scripts/check-problem9-image-toolchains.mjs --target problem9-devbox --build

      - name: Check runtime env examples
        run: node infra/scripts/check-runtime-env-examples.mjs

      - name: Check trusted-local auth boundaries
        run: node infra/scripts/check-trusted-local-boundaries.mjs

      - name: Check Problem 9 image policy
        run: node infra/scripts/check-problem9-image-policy.mjs

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared package
        run: bun run build:shared

      - name: Test API auth handoff routes
        run: bun run test:api

      - name: Test web auth relay functions
        run: bun --cwd apps/web test:functions

      - name: Typecheck workspace
        run: >-
          bun run typecheck:shared &&
          bun run typecheck:web &&
          bun run typecheck:api &&
          bun run typecheck:worker

      - name: Build workspace
        run: bun run build
