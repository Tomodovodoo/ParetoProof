name: Publish Problem 9 Devbox Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEVBOX_IMAGE: ghcr.io/${{ github.repository_owner }}/paretoproof-problem9-devbox

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: problem9-devbox-image-publish
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate devbox image metadata
        id: devbox_metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DEVBOX_IMAGE }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build devbox rootfs for toolchain verification
        run: >-
          docker buildx build
          --file apps/worker/Dockerfile
          --target problem9-devbox
          --output type=local,dest=.tmp/problem9-devbox-rootfs
          --cache-from type=gha,scope=problem9-execution
          --cache-from type=gha,scope=problem9-devbox
          .

      - name: Verify devbox image toolchains
        run: >-
          node infra/scripts/verify-problem9-image-toolchains.mjs
          --target problem9-devbox
          --rootfs .tmp/problem9-devbox-rootfs

      - name: Build and publish devbox image
        id: build_devbox
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/worker/Dockerfile
          target: problem9-devbox
          push: true
          tags: ${{ steps.devbox_metadata.outputs.tags }}
          labels: ${{ steps.devbox_metadata.outputs.labels }}
          cache-from: |
            type=gha,scope=problem9-execution
            type=gha,scope=problem9-devbox
          cache-to: type=gha,scope=problem9-devbox,mode=max

      - name: Record published image digest
        run: |
          {
            echo "# Problem 9 devbox publish result"
            echo
            echo "## ${{ env.DEVBOX_IMAGE }}"
            echo
            echo "Tags:"
            echo "${{ steps.devbox_metadata.outputs.tags }}"
            echo
            echo "Digest: \`${{ steps.build_devbox.outputs.digest }}\`"
          } | tee problem9-devbox-image-digest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: problem9-devbox-image-digest
          path: problem9-devbox-image-digest.md
