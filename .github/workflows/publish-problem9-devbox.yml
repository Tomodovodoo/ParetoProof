name: Publish Problem 9 Devbox

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DEVBOX_IMAGE: ghcr.io/${{ github.repository_owner }}/paretoproof-problem9-devbox

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: problem9-devbox-publish
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.DEVBOX_IMAGE }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and publish problem9-devbox
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/worker/Dockerfile
          target: problem9-devbox
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=problem9-devbox
          cache-to: type=gha,mode=max,scope=problem9-devbox

      - name: Write image metadata
        run: |
          mkdir -p image-metadata
          cat <<EOF > image-metadata/problem9-devbox.json
          {
            "target": "problem9-devbox",
            "image": ${{ toJson(env.DEVBOX_IMAGE) }},
            "tags": ${{ toJson(steps.metadata.outputs.tags) }},
            "digest": ${{ toJson(steps.build.outputs.digest) }},
            "gitSha": ${{ toJson(github.sha) }}
          }
          EOF

      - name: Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: problem9-image-metadata-problem9-devbox
          path: image-metadata/problem9-devbox.json
