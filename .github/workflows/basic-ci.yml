name: Basic CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f docs/intro.md
          grep -q "docs/intro.md" README.md
