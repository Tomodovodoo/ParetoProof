name: Publish Worker Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/worker/**"
      - "benchmarks/firstproof/problem9/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".github/workflows/publish-worker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/paretoproof-worker

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: worker-image-publish
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and publish worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
