name: Publish Worker Image

on:
  push:
    branches:
      - main
    paths:
      - "apps/worker/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.base.json"
      - ".github/workflows/publish-worker-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  WORKER_IMAGE: ghcr.io/${{ github.repository_owner }}/paretoproof-worker

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: worker-image-publish
      cancel-in-progress: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WORKER_IMAGE }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and publish worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
