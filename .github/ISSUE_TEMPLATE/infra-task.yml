name: Infra task
description: Track backend, runner, automation, deployment, or repository operations work.
title: "[infra] "
labels:
  - area:infra
  - kind:task
body:
  - type: input
    id: summary
    attributes:
      label: Task summary
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: State the operational or technical gap.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: dod
    attributes:
      label: Definition of done
    validations:
      required: true
