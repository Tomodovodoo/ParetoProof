name: Execution issue
description: Create a completable implementation task tied to resolved scope.
title: "[Team] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for execution work that is ready to be implemented and verified.
  - type: input
    id: parent_scope
    attributes:
      label: Parent scope issue
      description: Link the resolved scope issue when one exists.
      placeholder: "#377"
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the concrete outcome to implement.
      placeholder: |
        Implement ...
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the exact conditions that make this issue done.
      placeholder: |
        - [ ] Route exists
        - [ ] Contract matches shared schema
        - [ ] CI or local verification passes
    validations:
      required: true
  - type: textarea
    id: verification_steps
    attributes:
      label: Verification steps
      description: Include exact commands or review evidence required before closing the issue.
      placeholder: |
        - bun run ...
        - gh pr view ...
        - Attach artifact path or CI job
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts produced
      description: List files, bundles, logs, screenshots, or CI artifacts this task should produce.
      placeholder: |
        - docs/...
        - apps/api/...
        - CI artifact: ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Direct dependencies
      description: List any blocking issues explicitly.
      placeholder: |
        Depends on
        - #380
        - #154
  - type: textarea
    id: security_cost
    attributes:
      label: Security and cost impact
      description: Note any auth, data, abuse, or spend implications.
      placeholder: |
        - Security:
        - Cost:
    validations:
      required: true
  - type: textarea
    id: rollout
    attributes:
      label: Rollout and rollback
      description: Required for deployable changes; write `not applicable` when this does not touch a live surface.
      placeholder: |
        Rollout:
        Rollback:
    validations:
      required: true
